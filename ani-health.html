        .filter-dropdown { display: none; position: absolute; top: 100%; left: 0; width: 100%; max-height: 250px; overflow-y: auto; background: white; border: 1px solid #d1d5db; border-radius: 0.375rem; z-index: 100; margin-top: 4px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }

        .filter-option { display: flex; align-items: center; padding: 8px 12px; cursor: pointer; transition: background 0.2s; font-size: 12px; }

        .filter-option input[type="checkbox"] { margin-right: 8px; cursor: pointer; accent-color: #0047BB; }

        .corner-sticky { position: sticky; top: 0; left: 0; z-index: 40; }
        
        /* Flawless Zebra Striping w/ Sticky Columns */
        .table-row-zebra { border-bottom: 1px solid #f3f4f6; transition: background-color 0.15s; }
        .table-row-zebra:nth-child(even) { background-color: #f9fafb; }
        .table-row-zebra:hover { background-color: #E6EEF9 !important; }
        
        .table-row-zebra td.sticky-left { background-color: white; transition: background-color 0.15s; border-right: 1px solid #e5e7eb; position: sticky; left: 0; z-index: 10; }
        .table-row-zebra:nth-child(even) td.sticky-left { background-color: #f9fafb; }
        .table-row-zebra:hover td.sticky-left { background-color: #E6EEF9 !important; }
        
        /* Interactive Metrics Overlay */
        .metric-cell { transition: filter 0.2s; }
        .table-row-zebra:hover .metric-cell { filter: brightness(0.95); }

        .toggle-btn { transition: all 0.2s ease-in-out; }
    </style>

            "Calculating health metrics...",
            "Processing local presence..."
        ];

        function startLoadingSequence() {
            const subtextEl = document.getElementById('loading-subtext');
            if(!subtextEl) return;
            let i = 0;
            subtextEl.style.opacity = 0;
            setTimeout(() => { subtextEl.innerText = loadingMessages[0]; subtextEl.style.opacity = 1; }, 150);
            
            loadingInterval = setInterval(() => {
                i = (i + 1) % loadingMessages.length;
                subtextEl.style.opacity = 0; 
                setTimeout(() => {
                    subtextEl.innerText = loadingMessages[i];
                    subtextEl.style.opacity = 1; 
                }, 300); 
            }, 2500); 
        }

        function stopLoadingSequence() {
            if(loadingInterval) clearInterval(loadingInterval);
        }

        window.addEventListener('DOMContentLoaded', () => {

            // Sidebar Hover
            const sidebar = document.getElementById('sidebar');
            const menuTexts = document.querySelectorAll('.menu-text');
            if(sidebar) {
                sidebar.addEventListener('mouseenter', () => { sidebar.style.width = '256px'; menuTexts.forEach(el => el.classList.remove('opacity-0')); });
                sidebar.addEventListener('mouseleave', () => { sidebar.style.width = '72px'; menuTexts.forEach(el => el.classList.add('opacity-0')); });
            }

            window.toggleDropdown = function(id) {
                const el = document.getElementById(id);
                const isShowing = el.classList.contains('show');
                document.querySelectorAll('.filter-dropdown').forEach(d => d.classList.remove('show'));
                if (!isShowing) el.classList.add('show');
            };

            document.addEventListener('click', (e) => {
                if (!e.target.closest('.relative')) document.querySelectorAll('.filter-dropdown').forEach(d => d.classList.remove('show'));
            });

            document.getElementById('toggle-filters-btn').addEventListener('click', () => {
                const bar = document.getElementById('filter-bar');
                bar.classList.toggle('hidden'); bar.classList.toggle('flex');
            });

            // Global State for UI Toggles
            let currentMode = 'contacted'; 
            let minCallsThreshold = 0;
            let currentDomainFilter = 'all'; // 'all', 'Yes', or 'No'
            let activeData = null; 

            // Metric View Toggles
            document.getElementById('mode-contacted').addEventListener('click', (e) => {
                currentMode = 'contacted';
                e.target.className = "px-6 py-1.5 text-[10px] font-bold rounded shadow-sm bg-white text-blue-600 transition-all uppercase tracking-widest";
                document.getElementById('mode-connected').className = "px-6 py-1.5 text-[10px] font-semibold rounded text-gray-500 hover:text-gray-800 transition-all uppercase tracking-widest";
                if (activeData) renderMatrix(activeData);
            });
            
            document.getElementById('mode-connected').addEventListener('click', (e) => {
                currentMode = 'connected';
                e.target.className = "px-6 py-1.5 text-[10px] font-bold rounded shadow-sm bg-white text-emerald-600 transition-all uppercase tracking-widest";
                document.getElementById('mode-contacted').className = "px-6 py-1.5 text-[10px] font-semibold rounded text-gray-500 hover:text-gray-800 transition-all uppercase tracking-widest";
                if (activeData) renderMatrix(activeData);
            });

            // Domain ANI Toggles
            const updateDomainUI = (mode) => {
                const activeClass = "px-4 py-1.5 text-[10px] font-bold rounded shadow-sm bg-white text-brandblue transition-all uppercase tracking-widest";
                const inactiveClass = "px-4 py-1.5 text-[10px] font-semibold rounded text-gray-500 hover:text-gray-800 transition-all uppercase tracking-widest";
                
                document.getElementById('domain-all').className = mode === 'all' ? activeClass : inactiveClass;
                document.getElementById('domain-yes').className = mode === 'Yes' ? activeClass : inactiveClass;
                document.getElementById('domain-no').className = mode === 'No' ? activeClass : inactiveClass;
            };

            document.getElementById('domain-all').addEventListener('click', () => { currentDomainFilter = 'all'; updateDomainUI('all'); executeFilters(); });
            document.getElementById('domain-yes').addEventListener('click', () => { currentDomainFilter = 'Yes'; updateDomainUI('Yes'); executeFilters(); });
            document.getElementById('domain-no').addEventListener('click', () => { currentDomainFilter = 'No'; updateDomainUI('No'); executeFilters(); });

            document.getElementById('min-calls-input').addEventListener('change', (e) => {
                minCallsThreshold = parseInt(e.target.value) || 0;
                if (activeData) renderMatrix(activeData);
            });

            // 🛠️ 1. BULLETPROOF ASYNC FILTER INITIALIZATION (Without Domain Pre-select)
            const buildFiltersFromData = async (data) => {
                const populateDropdown = (dropId, btnId, objOrSet, defaultText) => {
                    const el = document.getElementById(dropId); 
                    const btnTextNode = document.getElementById(btnId.replace('btn-', 'text-'));
                    if (!el || el.innerHTML !== '') return; 

                    let items = Array.isArray(objOrSet) && objOrSet.length > 0 ? objOrSet : (objOrSet instanceof Set && objOrSet.size > 0 ? Array.from(objOrSet) : null);
                    
                    if (!items) {
                        let dynamicSet = new Set();
                        if (dropId === 'dropdown-date') {
                            Object.keys(data.dailyMetrics || {}).forEach(d => dynamicSet.add(d));
                        } else if (dropId === 'dropdown-campaign') {
                            Object.keys(data.campaigns || {}).forEach(c => dynamicSet.add(c));
                        } else if (dropId === 'dropdown-areaCodes' || dropId === 'dropdown-anis') {
                            Object.keys(data.anis || {}).forEach(a => {
                                if(dropId === 'dropdown-anis') dynamicSet.add(a);
                                if(dropId === 'dropdown-areaCodes' && a.length >= 3) dynamicSet.add(a.substring(0,3));
                            });
                        }
                        items = Array.from(dynamicSet);
                    }

                    items.sort();
                    items.forEach(i => {
                        let idSafe = String(i).replace(/[^a-zA-Z0-9]/g, '_');
                        el.innerHTML += `<label class="filter-option text-gray-700 hover:text-brandblue font-medium"><input type="checkbox" value="${i}" id="chk_${dropId}_${idSafe}">${i}</label>`;
                    });
                    
                    el.querySelectorAll('input').forEach(chk => {
                        chk.addEventListener('change', () => {
                            let checked = Array.from(el.querySelectorAll('input:checked'));
                            if (checked.length === 0) btnTextNode.innerText = defaultText;
                            else if (checked.length === 1) btnTextNode.innerText = checked[0].value;
                            else btnTextNode.innerText = `${checked.length} Selected`;
                            document.getElementById('clear-filters-btn').classList.remove('hidden');
                        });
                    });
                };

                let opts = data.filterOptions || {};
                populateDropdown('dropdown-date', 'btn-filter-date', opts.dates, 'All Selected');
                populateDropdown('dropdown-campaign', 'btn-filter-campaign', opts.campaigns, 'All Selected');
                populateDropdown('dropdown-areaCodes', 'btn-filter-areaCodes', opts.areaCodes, 'All Selected');
                populateDropdown('dropdown-anis', 'btn-filter-anis', opts.anis, 'All Selected');
            };

            const initFilters = async () => {
                const rawData = await localforage.getItem('dearDiallyMasterData');
                if (!rawData) return;
                const data = typeof rawData === 'string' ? JSON.parse(rawData) : rawData;
                await buildFiltersFromData(data); 
            };

            // --- MATRIX RENDERING ENGINE ---
            const renderMatrix = (data) => {
                const headerRow = document.getElementById('matrix-header');
                const tbody = document.getElementById('matrix-body');
                headerRow.innerHTML = ''; tbody.innerHTML = '';
                
                const dates = Object.keys(data.dailyMetrics).sort();
                
                let thHTML = `
                    <tr class="shadow-sm">
                        <th class="p-3 font-bold text-[10px] text-white uppercase tracking-widest corner-sticky min-w-[120px] bg-gradient-to-b from-gray-800 to-gray-900 border-r border-gray-700">ANI</th>
                `;
                dates.forEach(d => {
                    thHTML += `<th class="p-3 font-bold text-[10px] text-white uppercase tracking-widest text-center border-r border-[#003388] bg-gradient-to-b from-brandblue to-[#003388] min-w-[100px] header-sticky shadow-sm">${d.substring(5)}</th>`;
                });
                thHTML += `<th class="p-3 font-bold text-[10px] text-white uppercase tracking-widest text-center border-l-2 border-gray-600 bg-gradient-to-b from-gray-700 to-gray-800 min-w-[110px] header-sticky shadow-sm">Total / Avg</th></tr>`;
                
                headerRow.innerHTML = thHTML;

                let anisToRender = Object.entries(data.anis)
                    .filter(([ani, aData]) => aData.calls >= minCallsThreshold)
                    .sort(([a, _a], [b, _b]) => a.localeCompare(b)); 

                let rowsHtml = '';
                anisToRender.forEach(([aniStr, aData]) => {
                    
                    let rowStr = `<tr class="table-row-zebra">
                        <td class="p-3 font-semibold text-gray-800 font-mono sticky-left shadow-[2px_0_5px_rgba(0,0,0,0.02)]">${aniStr}</td>
                    `;

                    let rowTotalCalls = 0;
                    let rowTotalTarget = 0; 

                    dates.forEach(d => {
                        let dData = aData.daily[d];
                        if (!dData || dData.calls === 0) {
                            rowStr += `<td class="p-2 border-r border-gray-200 text-center bg-white/50 metric-cell"><span class="text-gray-300">-</span></td>`;
                        } else {
                            rowTotalCalls += dData.calls;
                            
                            let rate = 0;
                            if (currentMode === 'contacted') {
                                rate = (dData.contacted / dData.calls);
                                rowTotalTarget += dData.contacted;
                            } else {
                                rate = (dData.connects / dData.calls);
                                rowTotalTarget += dData.connects;
                            }
                            
                            let ratePct = (rate * 100).toFixed(1);
                            
                            let bgColor = '';
                            let textColor = 'text-gray-700';
                            
                            if (currentMode === 'contacted') {
                                if (rate < 0.15) { bgColor = 'bg-red-50/80'; textColor = 'text-red-700'; }
                                else if (rate <= 0.30) { bgColor = 'bg-amber-50/80'; textColor = 'text-amber-700'; }
                                else { bgColor = 'bg-emerald-50/80'; textColor = 'text-emerald-700'; }
                            } else {
                                if (rate < 0.05) { bgColor = 'bg-red-50/80'; textColor = 'text-red-700'; }
                                else if (rate <= 0.15) { bgColor = 'bg-amber-50/80'; textColor = 'text-amber-700'; }
                                else { bgColor = 'bg-emerald-50/80'; textColor = 'text-emerald-700'; }
                            }

                            rowStr += `
                                <td class="p-2 border-r border-gray-200 text-center ${bgColor} metric-cell">
                                    <div class="text-[9px] font-medium text-gray-400 font-mono mb-0.5">${dData.calls} calls</div>
                                    <div class="text-xs font-bold ${textColor}">${ratePct}%</div>
                                </td>
                            `;
                        }
                    });

                    let finalAvgRate = rowTotalCalls > 0 ? (rowTotalTarget / rowTotalCalls) * 100 : 0;
                    let finalColor = 'text-gray-700';
                    
                    if (currentMode === 'contacted') {
                        if (finalAvgRate < 15) finalColor = 'text-red-600';
                        else if (finalAvgRate <= 30) finalColor = 'text-amber-600';
                        else finalColor = 'text-emerald-600';
                    } else {
                        if (finalAvgRate < 5) finalColor = 'text-red-600';
                        else if (finalAvgRate <= 15) finalColor = 'text-amber-600';
                        else finalColor = 'text-emerald-600';
                    }

                    rowStr += `
                        <td class="p-2 border-l-2 border-gray-300 text-center bg-gray-100/80 metric-cell">
                            <div class="text-[9px] font-bold text-gray-500 font-mono mb-0.5">${rowTotalCalls.toLocaleString()} total</div>
                            <div class="text-sm font-black ${finalColor}">${finalAvgRate.toFixed(1)}%</div>
                        </td>
                    </tr>`;
                    
                    rowsHtml += rowStr;
                });
                tbody.innerHTML = rowsHtml;
            };

            const loadDashboardData = async (sourceDataStr) => {
                let data = sourceDataStr;
                if (!data) {
                    const rawData = await localforage.getItem('dearDiallyMasterData');
                    if (!rawData) return;
                    data = typeof rawData === 'string' ? JSON.parse(rawData) : rawData;
                } else if (typeof sourceDataStr === 'string') {
                    data = JSON.parse(sourceDataStr);
                }
                
                activeData = data;
                await buildFiltersFromData(activeData);
                renderMatrix(activeData);
            };

            // --- FILTER ENGINE EXECUTION (FULLY ASYNC) ---
            const executeFilters = async () => {
                const loadingOverlay = document.getElementById('loading-overlay');
                loadingOverlay.classList.remove('hidden');
                
                startLoadingSequence();
                
                const getVals = (id) => {
                    let el = document.getElementById(id);
                    return el ? Array.from(el.querySelectorAll('input:checked')).map(i => i.value) : [];
                };
                
                const activeFilters = {
                    months: [], 
                    weeks: [],  
                    dates: getVals('dropdown-date'),
                    campaigns: getVals('dropdown-campaign'),
                    lists: [],  
                    domainAnis: currentDomainFilter === 'all' ? [] : [currentDomainFilter],
                    areaCodes: getVals('dropdown-areaCodes'),
                    anis: getVals('dropdown-anis')
                };

                try {
                    const fileData = await localforage.getItem('dearDiallyRawCSV');
                    if (!fileData) {
                        stopLoadingSequence();
                        loadingOverlay.classList.add('hidden');
                        alert("File not found in local memory. Please re-upload on the Settings page.");
                        return;
                    }

                    if (activeFilterWorker) { activeFilterWorker.terminate(); }
                    activeFilterWorker = new Worker('worker.js');
                    
                    let mappingConfig = await localforage.getItem('diallyUserPrefs');
                    if (!mappingConfig) {
                        try { mappingConfig = JSON.parse(localStorage.getItem('diallyUserPrefs')); } catch(e) {}
                    }
                    if (typeof mappingConfig === 'string') mappingConfig = JSON.parse(mappingConfig);
                    mappingConfig = mappingConfig || { connects: [], successes: [], ansMac: [], badNum: [], noAns: [] };

                    let domainAnis = await localforage.getItem('dearDiallyInventoryAnis');
                    if (typeof domainAnis === 'string') domainAnis = JSON.parse(domainAnis);
                    domainAnis = domainAnis || [];

                    const safeBlob = fileData instanceof Blob ? fileData : new Blob([fileData], { type: 'text/csv' });
                    
                    activeFilterWorker.onmessage = function(e) {
                        if (e.data.status === 'complete') {
                            stopLoadingSequence();
                            loadingOverlay.classList.add('hidden');
                            loadDashboardData(JSON.stringify(e.data.results));
                            activeFilterWorker.terminate();
                            activeFilterWorker = null;
                            document.getElementById('clear-filters-btn').classList.remove('hidden');
                        }
                    };
                    
                    activeFilterWorker.onerror = function(error) {
                        console.error('Worker failed:', error);
                        stopLoadingSequence();
                        loadingOverlay.classList.add('hidden');
                        alert("Filter Engine encountered an error. See console for details.");
                        if (activeFilterWorker) activeFilterWorker.terminate();
                        activeFilterWorker = null;
                    };
                    
                    activeFilterWorker.postMessage({ 
                        action: 'PROCESS_CSV', 
                        file: safeBlob, 
                        mappingConfig: mappingConfig,
                        domainAnis: domainAnis,
                        filters: activeFilters 
                    });
                } catch (err) {
                    console.error(err);
                    stopLoadingSequence();
                    loadingOverlay.classList.add('hidden');
                    alert("Database Error: " + err);
                }
            };

            // Cancel Button Logic
            document.getElementById('btn-cancel-analysis').addEventListener('click', () => {
                if (activeFilterWorker) { activeFilterWorker.terminate(); activeFilterWorker = null; }
                stopLoadingSequence();
                document.getElementById('loading-overlay').classList.add('hidden');
            });

            document.getElementById('apply-filters-btn').addEventListener('click', executeFilters);
            
            document.getElementById('clear-filters-btn').addEventListener('click', async () => {
                document.querySelectorAll('.filter-dropdown input').forEach(chk => {
                    chk.checked = false;
                });
                
                document.querySelectorAll('[id^="text-filter-"]').forEach(el => el.innerText = "All Selected");
                
                currentDomainFilter = 'all';
                updateDomainUI('all');

                document.getElementById('clear-filters-btn').classList.add('hidden');
                executeFilters();
            });

            window.exportTableToCSV = function(filename) {
                const table = document.getElementById("matrix-table");
                let csv = [];
                for (let i = 0; i < table.rows.length; i++) {
                    let row = [], cols = table.rows[i].querySelectorAll("td, th");
                    for (let j = 0; j < cols.length; j++) {
                        let data = cols[j].innerText.replace(/(\r\n|\n|\r)/gm, " ").trim();
                        data = data.replace(/"/g, '""');
                        row.push('"' + data + '"');
                    }
                    csv.push(row.join(","));
                }
                let csvFile = new Blob([csv.join("\n")], {type: "text/csv"});
                let downloadLink = document.createElement("a");
                downloadLink.download = filename;
                downloadLink.href = window.URL.createObjectURL(csvFile);
                downloadLink.style.display = "none";
                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);
            }

            // Fire off initialization!
            initFilters();
            executeFilters();
        });
    </script>
</body>
</html>
