<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dear Dially Pro - ANI Health Matrix</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandblue: { DEFAULT: '#0047BB', dark: '#003388', light: '#E6EEF9' },
                        slate: { 50: '#f8fafc', 100: '#f1f5f9', 800: '#1e293b', 900: '#0f172a' }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f8fafc; color: #0f172a; -webkit-font-smoothing: antialiased; overflow: hidden; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .modern-panel { 
            background: #ffffff; border: 1px solid #e2e8f0; border-radius: 0.75rem; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05); 
        }
        
        .header-sticky { position: sticky; top: 0; z-index: 30; }
        .col-sticky { position: sticky; left: 0; z-index: 40; background: #f8fafc; border-right: 2px solid #e2e8f0; }
        
        .table-row-zebra { border-bottom: 1px solid #f1f5f9; transition: background-color 0.15s; }
        .table-row-zebra:nth-child(even) { background-color: #f8fafc; }
        .table-row-zebra:hover, .table-row-zebra:hover td.col-sticky { background-color: #E6EEF9 !important; }
        
        table { table-layout: fixed; width: 100%; border-collapse: separate; border-spacing: 0; }
        .metric-cell { border-right: 1px solid #f1f5f9; }
        .header-sortable { cursor: pointer; transition: background-color 0.2s; }
        .header-sortable:hover { background-color: #f1f5f9; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col overflow-hidden selection:bg-brandblue/20">

    <div id="loading-overlay" class="fixed inset-0 bg-slate-900/90 backdrop-blur-md z-[100] flex flex-col items-center justify-center hidden">
        <div class="w-16 h-16 rounded-full border-4 border-slate-700 border-t-brandblue animate-spin mb-4"></div>
        <h2 class="text-white font-black text-xl tracking-widest uppercase text-center">Batch Processing Matrix</h2>
        <p class="text-brandblue-light text-[10px] mt-3 font-mono font-bold tracking-widest uppercase" id="batch-progress">Normalizing Strings</p>
    </div>

    <div id="ai-modal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[200] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl max-w-3xl w-full overflow-hidden flex flex-col border border-slate-200">
            <div class="bg-gradient-to-r from-[#003388] to-[#0047BB] p-5 flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <div class="w-8 h-8 rounded-md bg-white/10 flex items-center justify-center backdrop-blur-sm border border-white/20">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    </div>
                    <h2 class="text-lg font-black text-white tracking-widest uppercase">Ask Dially</h2>
                </div>
                <button onclick="document.getElementById('ai-modal').classList.add('hidden')" class="text-white/70 hover:text-white transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-6 bg-slate-50 flex flex-col">
                <p class="text-xs text-slate-500 font-bold uppercase tracking-widest mb-2 flex justify-between">
                    <span>Synthesized AI Prompt / Response</span>
                    <span id="ai-active-provider" class="text-brandblue">Target: Not Set</span>
                </p>
                <div class="bg-slate-900 rounded-lg p-5 font-mono text-[11px] text-emerald-400 h-72 overflow-y-auto custom-scrollbar shadow-inner leading-relaxed" id="ai-prompt-output"></div>
                <div class="mt-5 flex justify-between items-center">
                    <span id="ai-key-status" class="text-[10px] font-bold uppercase tracking-widest text-slate-500 flex items-center bg-white px-3 py-1.5 rounded-md border border-slate-200 shadow-sm">
                        <span class="w-2 h-2 rounded-full bg-red-500 mr-2"></span> Key Not Found
                    </span>
                    <button id="execute-ai-btn" class="bg-emerald-600 hover:bg-emerald-700 text-white text-[11px] font-black tracking-widest uppercase px-6 py-2.5 rounded-md shadow-md transition-all flex items-center disabled:opacity-50">
                        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        Execute AI Strategy
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="z-50 bg-gradient-to-r from-[#003388] to-[#0047BB] shadow-md shrink-0 w-full px-6 lg:px-8 py-4 flex justify-between items-center">
        <div class="flex items-center">
            <div class="w-8 h-8 bg-white/10 rounded flex items-center justify-center mr-3 backdrop-blur-sm border border-white/10">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
            </div>
            <div>
                <h1 class="text-lg font-black text-white tracking-tight leading-tight">ANI Health Matrix</h1>
                <p class="text-[10px] text-brandblue-light font-medium tracking-widest uppercase opacity-80">Daily Performance Distribution</p>
            </div>
        </div>
        
        <button id="ask-dially-trigger" class="bg-white hover:bg-slate-50 text-brandblue-dark text-[10px] font-black tracking-widest uppercase px-4 py-2 rounded-lg shadow-sm transition-all flex items-center">
            <svg class="w-4 h-4 mr-2 text-brandblue" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            Ask Dially
        </button>
    </div>

    <main class="flex-1 w-full flex flex-col h-full space-y-5 px-6 lg:px-8 py-6 min-h-0 overflow-y-auto custom-scrollbar bg-slate-50" id="pdf-export-area">
        
        <div class="flex justify-between items-end shrink-0" data-html2canvas-ignore="true">
            <div class="flex items-center space-x-4">
                <div class="flex flex-col">
                    <label class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-1.5 ml-1">Domain Link</label>
                    <div class="flex items-center bg-white p-1 rounded-lg border border-slate-200 shadow-sm h-[34px]">
                        <button type="button" id="domain-all" class="px-4 text-[10px] font-bold rounded shadow-sm bg-brandblue text-white uppercase transition-colors">All</button>
                        <button type="button" id="domain-yes" class="px-4 text-[10px] font-semibold rounded text-slate-500 hover:text-slate-800 uppercase transition-colors">Linked</button>
                        <button type="button" id="domain-no" class="px-4 text-[10px] font-semibold rounded text-slate-500 hover:text-slate-800 uppercase transition-colors">Unlinked</button>
                        <div class="h-4 w-px bg-slate-200 mx-3"></div>
                        <p class="text-[9px] font-bold text-slate-400 uppercase pr-3">Inventory: <span id="debug-inv-count" class="text-brandblue font-black tracking-tighter">--</span></p>
                    </div>
                </div>

                <div class="flex flex-col">
                    <label class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-1.5 ml-1">Area Code / ANI Search</label>
                    <div class="relative w-48 h-[34px]">
                        <input type="text" id="filter-search" placeholder="Search NPA..." class="w-full h-full bg-white border border-slate-200 rounded-lg pl-8 pr-3 text-[11px] font-mono focus:ring-1 focus:ring-brandblue outline-none shadow-sm transition-all">
                        <svg class="w-3.5 h-3.5 text-slate-400 absolute left-2.5 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>
                </div>

                <div class="flex flex-col">
                    <label class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-1.5 ml-1">Data View</label>
                    <button type="button" id="mode-toggle" class="h-[34px] w-40 bg-white border border-slate-200 rounded-lg px-3 text-[10px] font-black text-brandblue uppercase tracking-widest hover:bg-slate-50 transition-colors shadow-sm">Show Connected %</button>
                </div>
            </div>

            <div class="flex space-x-3 h-[34px]">
                <button onclick="exportTableToCSV('ANI_Health_Matrix.csv')" class="text-[9px] font-black uppercase tracking-widest text-slate-600 hover:text-slate-900 bg-white hover:bg-slate-100 px-4 rounded-lg shadow-sm border border-slate-200 transition-colors flex items-center h-full">Export CSV</button>
                <button onclick="exportWorkspacePDF()" class="text-[9px] font-black uppercase tracking-widest text-white hover:text-white bg-slate-800 hover:bg-slate-900 px-4 rounded-lg shadow-sm transition-colors flex items-center h-full">Save PDF</button>
            </div>
        </div>

        <div class="flex-1 modern-panel overflow-hidden flex flex-col min-h-0 border-t-4 border-t-slate-800">
            <div class="overflow-auto flex-1 custom-scrollbar" id="matrix-scroll-area">
                <table class="w-full text-left border-collapse" id="matrix-table">
                    <thead class="header-sticky z-20 shadow-sm border-b border-slate-200" id="matrix-header">
                        </thead>
                    <tbody class="text-xs font-medium" id="matrix-body"></tbody>
                </table>
                <div id="pagination-trigger" class="p-8 flex justify-center hidden bg-slate-50 border-t border-slate-200">
                    <button type="button" id="btn-load-more" class="px-8 py-2.5 bg-brandblue hover:bg-brandblue-dark text-white text-[11px] font-black uppercase tracking-widest rounded-lg shadow-md transition-all">Load More Results</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        let sortedAnis = [];
        let currentDomainFilter = 'all';
        let currentMode = 'contacted';
        let currentMasterData = null;
        let itemsToShow = 100;
        let currentSortDir = 1;
        let lastSortKey = 'ani';

        const normalizeANI = (val) => String(val).replace(/\D/g, '').slice(-10);

        // 🛠️ DATA-LEVEL SORTING LOGIC
        window.sortTableData = (type, key = null) => {
            if (lastSortKey === (key || type)) {
                currentSortDir *= -1;
            } else {
                lastSortKey = key || type;
                currentSortDir = -1; // Default to Descending for metrics
            }

            sortedAnis.sort((a, b) => {
                let valA, valB;
                if (type === 'ani') {
                    valA = a[0]; valB = b[0];
                    return valA.localeCompare(valB) * currentSortDir;
                } else if (type === 'date') {
                    valA = a[1].daily[key]?.calls > 0 ? (currentMode === 'contacted' ? a[1].daily[key].contacted / a[1].daily[key].calls : a[1].daily[key].connects / a[1].daily[key].calls) : 0;
                    valB = b[1].daily[key]?.calls > 0 ? (currentMode === 'contacted' ? b[1].daily[key].contacted / b[1].daily[key].calls : b[1].daily[key].connects / b[1].daily[key].calls) : 0;
                } else if (type === 'avg') {
                    let callsA = Object.values(a[1].daily).reduce((sum, d) => sum + d.calls, 0);
                    let targetA = Object.values(a[1].daily).reduce((sum, d) => sum + (currentMode === 'contacted' ? d.contacted : d.connects), 0);
                    valA = callsA > 0 ? targetA / callsA : 0;
                    
                    let callsB = Object.values(b[1].daily).reduce((sum, d) => sum + d.calls, 0);
                    let targetB = Object.values(b[1].daily).reduce((sum, d) => sum + (currentMode === 'contacted' ? d.contacted : d.connects), 0);
                    valB = callsB > 0 ? targetB / callsB : 0;
                }
                return (valA - valB) * currentSortDir;
            });

            document.getElementById('matrix-body').innerHTML = '';
            renderMatrixSlice();
        };

        const renderMatrixSlice = () => {
            const tbody = document.getElementById('matrix-body');
            const dates = Object.keys(currentMasterData.dailyMetrics || {}).sort();
            const start = tbody.children.length;
            const slice = sortedAnis.slice(start, start + itemsToShow);
            
            const frag = document.createDocumentFragment();
            slice.forEach(([ani, aData]) => {
                const row = document.createElement('tr');
                row.className = "table-row-zebra";
                
                let rowTotalCalls = 0, rowTotalTarget = 0;
                let rowHtml = `<td class="p-4 font-mono font-bold text-slate-800 col-sticky shadow-[2px_0_5px_rgba(0,0,0,0.02)] whitespace-nowrap">${ani}</td>`;
                
                dates.forEach(d => {
                    const day = aData.daily[d];
                    if(!day || day.calls === 0) {
                        rowHtml += `<td class="p-3 border-r border-slate-100 text-center text-slate-300">-</td>`;
                    } else {
                        rowTotalCalls += day.calls;
                        const rate = currentMode === 'contacted' ? (day.contacted / day.calls) : (day.connects / day.calls);
                        rowTotalTarget += (currentMode === 'contacted' ? day.contacted : day.connects);
                        const ratePct = (rate * 100).toFixed(0);
                        
                        let bgColor = 'bg-slate-50', textColor = 'text-slate-400';
                        if (currentMode === 'contacted') {
                            if (rate < 0.15) { bgColor = 'bg-red-50'; textColor = 'text-red-600'; }
                            else if (rate <= 0.30) { bgColor = 'bg-amber-50'; textColor = 'text-amber-600'; }
                            else { bgColor = 'bg-emerald-50'; textColor = 'text-emerald-600'; }
                        } else {
                            if (rate < 0.05) { bgColor = 'bg-red-50'; textColor = 'text-red-600'; }
                            else if (rate <= 0.15) { bgColor = 'bg-amber-50'; textColor = 'text-amber-600'; }
                            else { bgColor = 'bg-emerald-50'; textColor = 'text-emerald-600'; }
                        }

                        rowHtml += `<td class="p-3 ${bgColor} border-r border-slate-100 text-center metric-cell">
                            <div class="text-[8px] font-bold opacity-40 font-mono mb-0.5">${day.calls}</div>
                            <div class="text-[11px] font-black ${textColor}">${ratePct}%</div>
                        </td>`;
                    }
                });

                const finalAvg = rowTotalCalls > 0 ? (rowTotalTarget / rowTotalCalls) * 100 : 0;
                let finalColor = finalAvg < (currentMode === 'contacted' ? 15 : 5) ? 'text-red-600' : 'text-emerald-600';

                rowHtml += `<td class="p-3 border-l-2 border-slate-200 text-center bg-white sticky right-0">
                    <div class="text-[9px] font-bold text-slate-400 mb-0.5 font-mono">${rowTotalCalls.toLocaleString()}</div>
                    <div class="text-xs font-black ${finalColor}">${finalAvg.toFixed(1)}%</div>
                </td>`;

                row.innerHTML = rowHtml;
                frag.appendChild(row);
            });
            tbody.appendChild(frag);
            document.getElementById('pagination-trigger').classList.toggle('hidden', tbody.children.length >= sortedAnis.length);
        };

        const runBatchMatrix = () => {
            const memory = window.parent.diallyMemory;
            if (!memory?.masterData) return;
            currentMasterData = memory.masterData;
            const invList = memory.inventoryAnis || [];
            document.getElementById('debug-inv-count').innerText = invList.length.toLocaleString();

            document.getElementById('loading-overlay').classList.remove('hidden');
            const domainSet = new Set(invList.map(normalizeANI));
            const searchVal = document.getElementById('filter-search').value.trim();
            const allEntries = Object.entries(currentMasterData.anis || {});
            let index = 0; sortedAnis = [];

            function chunk() {
                const limit = Math.min(index + 5000, allEntries.length);
                document.getElementById('batch-progress').innerText = `Building Matrix: ${limit.toLocaleString()} rows...`;
                for (; index < limit; index++) {
                    const [ani, a] = allEntries[index];
                    if (a.calls === 0) continue;
                    const normalized = normalizeANI(ani);
                    if (searchVal && !normalized.includes(searchVal)) continue;
                    const isMatch = domainSet.has(normalized);
                    if ((currentDomainFilter === 'Yes' && isMatch) || (currentDomainFilter === 'No' && !isMatch) || currentDomainFilter === 'all') {
                        sortedAnis.push([ani, a]);
                    }
                }
                if (index < allEntries.length) { setTimeout(chunk, 0); } 
                else {
                    const header = document.getElementById('matrix-header');
                    const dates = Object.keys(currentMasterData.dailyMetrics || {}).sort();
                    let headHtml = `<tr class="bg-slate-50 border-b border-slate-200">
                        <th class="p-4 col-sticky border-b border-slate-200 w-32 text-left text-slate-800 text-[10px] font-black uppercase tracking-widest whitespace-nowrap header-sortable" onclick="sortTableData('ani')">ANI Number ↕</th>`;
                    dates.forEach(d => { headHtml += `<th class="p-3 text-[10px] font-black text-brandblue uppercase tracking-widest text-center border-r border-slate-200 whitespace-nowrap min-w-[100px] header-sortable" onclick="sortTableData('date', '${d}')">${d.substring(5)} ↕</th>`; });
                    headHtml += `<th class="p-3 text-[10px] font-black text-slate-800 uppercase tracking-widest text-center border-l-2 border-slate-200 whitespace-nowrap min-w-[110px] header-sortable" onclick="sortTableData('avg')">Avg % ↕</th></tr>`;
                    header.innerHTML = headHtml;
                    sortedAnis.sort((a,b) => a[0].localeCompare(b[0]));
                    document.getElementById('matrix-body').innerHTML = '';
                    renderMatrixSlice();
                    document.getElementById('loading-overlay').classList.add('hidden');
                }
            }
            chunk();
        };

        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('btn-load-more').onclick = renderMatrixSlice;
            document.getElementById('filter-search').addEventListener('input', runBatchMatrix);
            document.getElementById('mode-toggle').onclick = (e) => {
                currentMode = currentMode === 'contacted' ? 'connected' : 'contacted';
                e.target.innerText = currentMode === 'contacted' ? 'Show Connected %' : 'Show Contacted %';
                runBatchMatrix();
            };
            document.getElementById('domain-all').onclick = () => { currentDomainFilter='all'; setUI('all'); runBatchMatrix(); };
            document.getElementById('domain-yes').onclick = () => { currentDomainFilter='Yes'; setUI('Yes'); runBatchMatrix(); };
            document.getElementById('domain-no').onclick = () => { currentDomainFilter='No'; setUI('No'); runBatchMatrix(); };
            runBatchMatrix();
        });

        const setUI = (mode) => {
            ['all','yes','no'].forEach(id => document.getElementById(`domain-${id}`).className = "px-4 text-[10px] font-semibold rounded text-slate-500 hover:text-slate-800 uppercase transition-colors");
            const btn = document.getElementById(`domain-${mode === 'all' ? 'all' : (mode === 'Yes' ? 'yes' : 'no')}`);
            btn.className = "px-4 text-[10px] font-bold rounded shadow-sm bg-brandblue text-white uppercase transition-colors";
        };

        window.exportTableToCSV = function(filename) {
            const table = document.getElementById("matrix-table");
            let csv = [];
            for (let i = 0; i < table.rows.length; i++) {
                let row = [], cols = table.rows[i].querySelectorAll("td, th");
                for (let j = 0; j < cols.length; j++) row.push('"' + cols[j].innerText.trim() + '"');
                csv.push(row.join(","));
            }
            const link = document.createElement("a");
            link.download = filename; link.href = URL.createObjectURL(new Blob([csv.join("\n")], {type: "text/csv"}));
            link.click();
        };

        window.exportWorkspacePDF = function() {
            const area = document.getElementById('matrix-scroll-area');
            const origH = area.style.height; area.style.height = 'auto';
            html2pdf().set({ margin: 0.2, filename: 'Dially_Health_Matrix.pdf', image: { type: 'jpeg', quality: 1 }, html2canvas: { scale: 1.5 }, jsPDF: { format: 'letter', orientation: 'landscape' } })
                .from(document.getElementById('pdf-export-area')).save().then(() => area.style.height = origH);
        };

        // 🛠️ LIVE AI STRATEGY ENGINE EXECUTION
        let currentSynthesizedPrompt = "";
        document.getElementById('ask-dially-trigger').addEventListener('click', () => {
            const modal = document.getElementById('ai-modal');
            const key = localStorage.getItem('dially_ai_key');
            const provider = localStorage.getItem('dially_ai_provider') || 'Not Set';
            modal.classList.remove('hidden');

            document.getElementById('ai-active-provider').innerText = `Target: ${provider.toUpperCase()}`;
            document.getElementById('ai-key-status').innerHTML = key ? `<span class="w-2 h-2 rounded-full bg-emerald-500 mr-2 animate-pulse"></span> Key Verified` : `<span class="w-2 h-2 rounded-full bg-red-500 mr-2"></span> Setup Required`;

            let areaCodes = {};
            sortedAnis.slice(0, 100).forEach(a => {
                let ac = a[0].substring(0,3);
                if(!areaCodes[ac]) areaCodes[ac] = { calls: 0, hits: 0 };
                areaCodes[ac].calls += Object.values(a[1].daily).reduce((s,d)=>s+d.calls,0);
                areaCodes[ac].hits += Object.values(a[1].daily).reduce((s,d)=>s+(currentMode === 'contacted' ? d.contacted : d.connects),0);
            });

            let topSaturated = Object.entries(areaCodes).sort((a,b) => b[1].calls - a[1].calls).slice(0,3).map(x => `- Area Code ${x[0]}: ${x[1].calls} dials, ${(x[1].hits/x[1].calls*100).toFixed(1)}% yield`).join('\n');
            
            currentSynthesizedPrompt = `You are a Master Dialer Strategist acting as 'Ask Dially'. Analyze this Caller ID (ANI) Health Matrix for ${currentMode.toUpperCase()} trends.\n\n--- AREA CODE SATURATION ---\n${topSaturated}\n\nIdentify ANI which seems to be not getting high dialing results and identify ANIs that seem to have high saturation for an area. Provide 3 tactical actions. Keep it extremely brief.`;
            
            const out = document.getElementById('ai-prompt-output');
            out.innerText = ''; let i = 0;
            const tw = () => { if(i < currentSynthesizedPrompt.length) { out.innerHTML += currentSynthesizedPrompt.charAt(i); i++; setTimeout(tw, 2); } };
            tw();
        });

        document.getElementById('execute-ai-btn').addEventListener('click', async () => {
            const out = document.getElementById('ai-prompt-output');
            const key = localStorage.getItem('dially_ai_key');
            const provider = localStorage.getItem('dially_ai_provider');
            out.innerHTML = `<div class="flex items-center text-emerald-400 animate-pulse"><div class="w-4 h-4 border-2 border-emerald-500 border-t-transparent rounded-full animate-spin mr-3"></div> Contacting ${provider.toUpperCase()} Engine...</div>`;
            document.getElementById('execute-ai-btn').disabled = true;

            try {
                let resultText = "";
                if (provider === 'gemini') {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro-latest:generateContent?key=${key}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: currentSynthesizedPrompt }] }] })
                    });
                    const data = await res.json();
                    resultText = data.candidates[0].content.parts[0].text;
                } else if (provider === 'openai') {
                    const res = await fetch(`https://api.openai.com/v1/chat/completions`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                        body: JSON.stringify({ model: 'gpt-4o', messages: [{ role: 'user', content: currentSynthesizedPrompt }] })
                    });
                    const data = await res.json();
                    resultText = data.choices[0].message.content;
                } else if (provider === 'groq') {
                    const res = await fetch(`https://api.groq.com/openai/v1/chat/completions`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                        body: JSON.stringify({ model: 'llama3-70b-8192', messages: [{ role: 'user', content: currentSynthesizedPrompt }] })
                    });
                    const data = await res.json();
                    resultText = data.choices[0].message.content;
                } else if (provider === 'anthropic') {
                    const res = await fetch(`https://api.anthropic.com/v1/messages`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
                        body: JSON.stringify({ model: 'claude-3-opus-20240229', max_tokens: 1024, messages: [{ role: 'user', content: currentSynthesizedPrompt }] })
                    });
                    const data = await res.json();
                    resultText = data.content[0].text;
                }
                out.innerHTML = `<div class="text-white whitespace-pre-wrap"><span class="text-emerald-500 font-bold uppercase tracking-widest block mb-4 border-b border-slate-700 pb-2">Dially Strategy Output:</span>${resultText}</div>`;
            } catch (error) {
                out.innerHTML = `<div class="text-red-400 font-bold">Connection Failed to ${provider.toUpperCase()}:<br><span class="text-red-300 font-normal mt-2 inline-block">${error.message}</span></div>`;
            } finally { document.getElementById('execute-ai-btn').disabled = false; }
        });
    </script>
</body>
</html>
