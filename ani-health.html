<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dear Dially Pro - ANI Health Matrix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brandblue: { DEFAULT: '#0047BB', dark: '#003388', light: '#E6EEF9' } },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: transparent; color: #111827; -webkit-font-smoothing: antialiased; overflow: hidden; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .data-panel { background: #ffffff; border: 1px solid #e5e7eb; border-radius: 0.5rem; box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05); }
        .header-sticky { position: sticky; top: 0; z-index: 30; }
        .corner-sticky { position: sticky; top: 0; left: 0; z-index: 40; background: #111827; border-right: 2px solid #374151; }
        .table-row-zebra { border-bottom: 1px solid #f3f4f6; }
        .table-row-zebra:nth-child(even) { background-color: #f9fafb; }
        .table-row-zebra:hover, .table-row-zebra:hover .sticky-left { background-color: #E6EEF9 !important; }
        .sticky-left { position: sticky; left: 0; z-index: 10; background: white; border-right: 2px solid #e5e7eb; }
        /* Memory Safe: Fixed table layout prevents browser reflow crashes */
        table { table-layout: fixed; width: 100%; border-collapse: separate; border-spacing: 0; }
        
        body.in-shell #sidebar { display: none; }
        body.in-shell main { margin-left: 0 !important; }
    </style>
</head>
<body class="h-screen w-screen flex p-4 lg:p-8 overflow-hidden relative">

    <!-- ANTI-CRASH OVERLAY -->
    <div id="loading-overlay" class="fixed inset-0 bg-gray-900/95 backdrop-blur-md z-[100] flex flex-col items-center justify-center hidden">
        <div class="w-16 h-16 rounded-full border-4 border-gray-700 border-t-brandblue animate-spin mb-4"></div>
        <h2 class="text-white font-black text-xl tracking-widest uppercase">Throttling Health Matrix...</h2>
        <p class="text-gray-400 text-[10px] mt-2 font-mono uppercase tracking-widest" id="batch-progress">Scanning Data In Chunks</p>
    </div>

    <main class="flex-1 w-full flex flex-col h-full space-y-4 min-h-0">
        
        <!-- HEADER -->
        <div class="flex justify-between items-end pb-2 shrink-0 border-b border-gray-200">
            <div class="flex flex-col">
                <h1 class="text-3xl font-black text-gray-900 tracking-tight">ANI Health <span class="text-lg text-brandblue font-medium ml-2 uppercase tracking-widest">| Matrix</span></h1>
                <p class="text-[9px] font-bold text-gray-400 uppercase mt-1">Inventory in Memory: <span id="debug-inv-count" class="text-brandblue">--</span></p>
            </div>
            
            <div class="flex items-center space-x-3">
                <div class="flex bg-gray-100 p-1 rounded-lg border border-gray-200 shadow-inner">
                    <button type="button" id="domain-all" class="px-4 py-1.5 text-[10px] font-bold rounded shadow-sm bg-white text-brandblue uppercase">All</button>
                    <button type="button" id="domain-yes" class="px-4 py-1.5 text-[10px] font-semibold rounded text-gray-500 uppercase">Yes</button>
                    <button type="button" id="domain-no" class="px-4 py-1.5 text-[10px] font-semibold rounded text-gray-500 uppercase">No</button>
                </div>
                <button type="button" id="mode-toggle" class="bg-white border border-gray-300 text-gray-700 font-bold text-[10px] px-4 py-2 rounded uppercase shadow-sm">Show Connected %</button>
                <button type="button" onclick="exportTableToCSV('ANI_Health_Matrix.csv')" class="bg-brandblue text-white font-bold text-[10px] px-4 py-2 rounded uppercase shadow-md">Export CSV</button>
            </div>
        </div>

        <!-- MATRIX TABLE WRAPPER -->
        <div class="flex-1 bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden flex flex-col relative min-h-0">
            <div class="overflow-auto flex-1 custom-scrollbar" id="matrix-scroll-area">
                <table class="w-full text-left border-collapse" id="matrix-table">
                    <thead class="header-sticky z-20" id="matrix-header"></thead>
                    <tbody class="text-[11px] font-medium" id="matrix-body"></tbody>
                </table>
                <!-- PAGINATION: Prevents browser from choking on 5000+ rows -->
                <div id="pagination-trigger" class="p-8 flex justify-center hidden bg-gray-50 border-t">
                    <button type="button" id="btn-load-more" class="px-8 py-2 bg-brandblue text-white text-[10px] font-bold uppercase rounded shadow-lg transition-transform hover:scale-105 active:scale-95">Load More ANIs</button>
                </div>
            </div>
        </div>

    </main>

    <script>
        let sortedAnis = [];
        let currentDomainFilter = 'all';
        let currentMode = 'contacted';
        let itemsToShow = 50; // 🛠️ Start small to prevent initial rendering crash
        let currentMasterData = null;

        const cleanANI = (val) => {
            let s = String(val).replace(/\D/g, ''); 
            return s.slice(-10); 
        };

        const renderMatrixSlice = () => {
            const tbody = document.getElementById('matrix-body');
            const dates = Object.keys(currentMasterData.dailyMetrics || {}).sort();
            const start = tbody.children.length;
            const slice = sortedAnis.slice(start, start + itemsToShow);
            
            const frag = document.createDocumentFragment();
            slice.forEach(([ani, aData]) => {
                const row = document.createElement('tr');
                row.className = "table-row-zebra";
                let rowHtml = `<td class="p-3 font-mono font-bold sticky-left border-r border-gray-100 min-w-[140px]">${ani}</td>`;
                
                dates.forEach(d => {
                    const day = aData.daily[d];
                    if(!day || day.calls === 0) {
                        rowHtml += `<td class="p-3 text-center text-gray-300 border-r border-gray-50">-</td>`;
                    } else {
                        const rate = currentMode === 'contacted' ? (day.contacted / day.calls) : (day.connects / day.calls);
                        const ratePct = (rate * 100).toFixed(0);
                        const color = rate < (currentMode === 'contacted' ? 0.15 : 0.05) ? 'text-red-600 font-black' : 'text-emerald-600 font-black';
                        rowHtml += `<td class="p-3 text-center border-r border-gray-50 min-w-[100px]">
                            <div class="text-[8px] opacity-40 mb-1">${day.calls}</div>
                            <div class="${color}">${ratePct}%</div>
                        </td>`;
                    }
                });
                row.innerHTML = rowHtml;
                frag.appendChild(row);
            });
            tbody.appendChild(frag);
            document.getElementById('pagination-trigger').classList.toggle('hidden', tbody.children.length >= sortedAnis.length);
        };

        const processHealthFilter = () => {
            const memory = window.parent.diallyMemory;
            const data = memory?.masterData;
            const invList = memory?.inventoryAnis || [];
            document.getElementById('debug-inv-count').innerText = invList.length.toLocaleString();

            if (!data) return;
            currentMasterData = data;
            document.getElementById('loading-overlay').classList.remove('hidden');

            const domainSet = new Set(invList.map(cleanANI));
            const allEntries = Object.entries(data.anis || {});
            let index = 0;
            sortedAnis = [];

            function chunk() {
                const limit = Math.min(index + 5000, allEntries.length);
                document.getElementById('batch-progress').innerText = `Filtering ${limit.toLocaleString()} records...`;

                for (; index < limit; index++) {
                    const [ani, a] = allEntries[index];
                    if (a.calls === 0) continue;

                    const normalized = cleanANI(ani);
                    const isDomainMatch = domainSet.has(normalized);

                    if ((currentDomainFilter === 'Yes' && isDomainMatch) || (currentDomainFilter === 'No' && !isDomainMatch) || currentDomainFilter === 'all') {
                        sortedAnis.push([ani, a]);
                    }
                }

                if (index < allEntries.length) { setTimeout(chunk, 0); } 
                else {
                    // Build Headers Once
                    const header = document.getElementById('matrix-header');
                    const dates = Object.keys(data.dailyMetrics || {}).sort();
                    let headHtml = `<tr><th class="p-3 corner-sticky text-[10px] text-white uppercase border-r border-gray-700">ANI</th>`;
                    dates.forEach(d => headHtml += `<th class="p-3 text-center bg-gray-800 text-white text-[9px] uppercase border-r border-gray-700 min-w-[100px]">${d.substring(5)}</th>`);
                    header.innerHTML = headHtml + `</tr>`;

                    // Initial Render
                    sortedAnis.sort((a,b) => a[0].localeCompare(b[0]));
                    document.getElementById('matrix-body').innerHTML = '';
                    renderMatrixSlice();
                    document.getElementById('loading-overlay').classList.add('hidden');
                }
            }
            chunk();
        };

        window.addEventListener('DOMContentLoaded', () => {
            if (window.self !== window.top) document.body.classList.add('in-shell');
            document.getElementById('btn-load-more').onclick = renderMatrixSlice;
            
            document.getElementById('mode-toggle').onclick = (e) => {
                currentMode = currentMode === 'contacted' ? 'connected' : 'contacted';
                e.target.innerText = currentMode === 'contacted' ? 'Show Connected %' : 'Show Contacted %';
                processHealthFilter();
            };

            document.getElementById('domain-all').onclick = () => { currentDomainFilter='all'; processHealthFilter(); };
            document.getElementById('domain-yes').onclick = () => { currentDomainFilter='Yes'; processHealthFilter(); };
            document.getElementById('domain-no').onclick = () => { currentDomainFilter='No'; processHealthFilter(); };
            
            processHealthFilter();
        });

        window.exportTableToCSV = function(filename) {
            const table = document.getElementById("matrix-table");
            let csv = [];
            for (let i = 0; i < table.rows.length; i++) {
                let row = [], cols = table.rows[i].querySelectorAll("td, th");
                for (let j = 0; j < cols.length; j++) {
                    row.push('"' + cols[j].innerText.replace(/(\r\n|\n|\r)/gm, " ").trim() + '"');
                }
                csv.push(row.join(","));
            }
            let csvFile = new Blob([csv.join("\n")], {type: "text/csv"});
            let link = document.createElement("a");
            link.download = filename; link.href = window.URL.createObjectURL(csvFile);
            link.click();
        }
    </script>
</body>
</html>
