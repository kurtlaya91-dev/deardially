        const MAX_TABS = 5;
        let activeTabs = []; 
        let currentTabId = null; 

        const tabContainer = document.getElementById('tab-container');
        const workspaceContainer = document.getElementById('workspace-container');

        // --- 2. CORE TAB LOGIC ---
        function openTab(routeId) {
            if (!APP_ROUTES[routeId]) return;

            // If already open, switch to it
            if (activeTabs.includes(routeId)) {
                switchTab(routeId);
                return;
            }

            // RAM Protection: Enforce 5 Tab Limit
            if (activeTabs.length >= MAX_TABS) {
                const oldestTab = activeTabs.find(id => id !== 'home'); // Prioritize closing anything but home
                if (oldestTab) closeTab(oldestTab, false);
            }

            // Create Tab UI
            activeTabs.push(routeId);
            const route = APP_ROUTES[routeId];
            
            const tabEl = document.createElement('div');
            tabEl.id = `tab-${routeId}`;
            tabEl.className = `group flex items-center px-4 py-2 bg-slate-300 text-slate-500 hover:bg-slate-200 hover:text-slate-700 rounded-t-lg cursor-pointer select-none max-w-[200px] min-w-[140px] transition-colors border-t-2 border-transparent border-x border-slate-300 shadow-sm relative`;
            tabEl.innerHTML = `
                <div class="mr-2 opacity-70 group-hover:opacity-100 transition-opacity" id="tab-icon-${routeId}">${route.icon}</div>
                <span class="truncate text-xs font-semibold mr-2 flex-1">${route.title}</span>
                <button onclick="closeTab('${routeId}', true); event.stopPropagation();" class="opacity-0 group-hover:opacity-100 hover:bg-slate-400/20 rounded p-1 text-slate-500 hover:text-red-500 transition-all">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            `;
            tabEl.onclick = () => switchTab(routeId);
            tabContainer.appendChild(tabEl);

            // Create Iframe Engine
            const iframeEl = document.createElement('iframe');
            iframeEl.id = `iframe-${routeId}`;
            iframeEl.src = `${routeId}.html`;
            iframeEl.className = `w-full h-full border-none m-0 p-0 hidden bg-slate-50 absolute inset-0`;
            workspaceContainer.appendChild(iframeEl);

            switchTab(routeId);
        }

        function switchTab(routeId) {
            currentTabId = routeId;

            // 1. Update Tab Bar UI
            activeTabs.forEach(id => {
                const tab = document.getElementById(`tab-${id}`);
                const icon = document.getElementById(`tab-icon-${id}`);
                const frame = document.getElementById(`iframe-${id}`);
                
                if (id === routeId) {
                    tab.className = `group flex items-center px-4 py-2.5 bg-slate-50 text-brandblue rounded-t-lg cursor-pointer select-none max-w-[200px] min-w-[140px] transition-colors border-t-2 border-t-brandblue border-x border-slate-300 relative z-10`;
                    icon.classList.remove('opacity-70', 'text-slate-500');
                    frame.classList.remove('hidden');
                    frame.classList.add('block');
                } else {
                    tab.className = `group flex items-center px-4 py-2 bg-slate-300 text-slate-500 hover:bg-slate-200 hover:text-slate-700 rounded-t-lg cursor-pointer select-none max-w-[200px] min-w-[140px] transition-colors border-t-2 border-t-transparent border-x border-slate-300 shadow-[inset_0_-2px_4px_rgba(0,0,0,0.05)] relative z-0`;
                    icon.classList.add('opacity-70');
                    frame.classList.remove('block');
                    frame.classList.add('hidden');
                }
            });

            // 2. Update Sidebar Active State
            document.querySelectorAll('.nav-item').forEach(nav => {
                nav.classList.remove('bg-brandblue-light/50', 'is-active');
                const label = nav.querySelector('.label');
                const icon = nav.querySelector('.icon');
                const marker = nav.querySelector('.active-marker');
                if(label) { label.classList.remove('font-bold', 'text-brandblue'); label.classList.add('font-semibold', 'text-slate-600'); }
                if(icon) { icon.classList.remove('text-brandblue'); icon.classList.add('text-slate-400'); }
                if(marker) { marker.classList.add('hidden'); marker.classList.remove('block'); }
            });

            const targetNav = document.querySelector(`.nav-item[data-target="${routeId}"]`);
            if (targetNav) {
                targetNav.classList.add('bg-brandblue-light/50', 'is-active');
                const label = targetNav.querySelector('.label');
                const icon = targetNav.querySelector('.icon');
                const marker = targetNav.querySelector('.active-marker');
                if(label) { label.classList.add('font-bold', 'text-brandblue'); label.classList.remove('font-semibold', 'text-slate-600'); }
                if(icon) { icon.classList.add('text-brandblue'); icon.classList.remove('text-slate-400'); }
                if(marker) { marker.classList.remove('hidden'); marker.classList.add('block'); }
            }
        }

        function closeTab(routeId, switchAfterClose = true) {
            if (activeTabs.length <= 1) return; // Prevent closing the last tab

            activeTabs = activeTabs.filter(id => id !== routeId);
            document.getElementById(`tab-${routeId}`).remove();
            document.getElementById(`iframe-${routeId}`).remove();

            if (switchAfterClose && currentTabId === routeId) {
                switchTab(activeTabs[activeTabs.length - 1]);
            }
        }

        // --- 3. EVENT LISTENERS ---
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                const target = this.getAttribute('data-target');
                if (target) openTab(target);
            });
        });

        // Stealth Router
        window.addEventListener('hashchange', () => {
            const hash = window.location.hash.substring(1);
            if (hash && APP_ROUTES[hash]) {
                openTab(hash);
                history.replaceState(null, null, ' ');
            }
        });

        // --- 4. INITIALIZATION ---
        window.addEventListener('DOMContentLoaded', () => {
            openTab('home'); 
            
            if (window.location.hash) {
                const initHash = window.location.hash.substring(1);
                if (APP_ROUTES[initHash]) {
                    openTab(initHash);
                }
                history.replaceState(null, null, ' ');
            }
        });

    </script>
</body>
</html>
