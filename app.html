    <!-- Sidebar Active State Script -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const navItems = document.querySelectorAll('.nav-item');
            
            navItems.forEach(item => {
                item.addEventListener('click', function() {
                    // Reset all items to inactive state
                    navItems.forEach(nav => {
                        nav.classList.remove('bg-brandblue-light/50', 'is-active');
                        
                        const label = nav.querySelector('.label');
                        const icon = nav.querySelector('.icon');
                        const marker = nav.querySelector('.active-marker');
                        
                        if(label) { label.classList.remove('font-bold', 'text-brandblue'); label.classList.add('font-semibold', 'text-gray-600'); }
                        if(icon) { icon.classList.remove('text-brandblue'); icon.classList.add('text-gray-400'); }
                        if(marker) { marker.classList.add('hidden'); marker.classList.remove('block'); }
                    });

                    // Set clicked item to active state
                    this.classList.add('bg-brandblue-light/50', 'is-active');
                    
                    const label = this.querySelector('.label');
                    const icon = this.querySelector('.icon');
                    const marker = this.querySelector('.active-marker');
                    
                    if(label) { label.classList.add('font-bold', 'text-brandblue'); label.classList.remove('font-semibold', 'text-gray-600'); }
                    if(icon) { icon.classList.add('text-brandblue'); icon.classList.remove('text-gray-400'); }
                    if(marker) { marker.classList.remove('hidden'); marker.classList.add('block'); }
                });
            });
        });
    </script>
