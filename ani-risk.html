<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dear Dially Pro - ANI Risk Matrix</title>
    
    <!-- Tailwind & Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandblue: { DEFAULT: '#0047BB', dark: '#003388', light: '#E6EEF9' }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        /* Body hidden overflow to prevent double scrollbars in the shell */
        body { background-color: transparent; color: #111827; -webkit-font-smoothing: antialiased; overflow: hidden; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f3f4f6; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .data-panel { background: #ffffff; border: 1px solid #e5e7eb; border-radius: 0.5rem; box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05); }
        
        /* Filter Dropdowns */
        .filter-dropdown { display: none; position: absolute; top: 100%; left: 0; width: 100%; max-height: 250px; overflow-y: auto; background: white; border: 1px solid #d1d5db; border-radius: 0.375rem; z-index: 100; margin-top: 4px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .filter-dropdown.show { display: block; }
        .filter-option { display: flex; align-items: center; padding: 8px 12px; cursor: pointer; transition: background 0.2s; font-size: 12px; }
        .filter-option:hover { background: #f3f4f6; }
        
        .header-sticky { position: sticky; top: 0; z-index: 30; }
        .col-sticky { position: sticky; left: 0; z-index: 40; background: white; border-right: 1px solid #e5e7eb; }

        .table-row-zebra { border-bottom: 1px solid #f3f4f6; transition: background-color 0.15s; }
        .table-row-zebra:nth-child(even) { background-color: #f9fafb; }
        .table-row-zebra:hover { background-color: #E6EEF9 !important; }
        .table-row-zebra:hover td.col-sticky { background-color: #E6EEF9 !important; }

        .card-hover { transition: transform 0.2s, box-shadow 0.2s; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="h-screen w-screen flex p-4 lg:p-8 overflow-hidden relative">

    <!-- LOADING OVERLAY -->
    <div id="loading-overlay" class="fixed inset-0 bg-gray-900/80 backdrop-blur-sm z-[100] flex flex-col items-center justify-center hidden">
        <div class="w-16 h-16 rounded-full border-4 border-gray-700 border-t-brandblue animate-spin mb-4"></div>
        <h2 class="text-white font-black text-xl tracking-widest uppercase">The Sommelier is Working</h2>
    </div>

    <!-- MAIN CONTENT -->
    <main class="flex-1 w-full flex flex-col h-full space-y-4 min-h-0">
        
        <!-- HEADER -->
        <div class="flex justify-between items-end pb-2 shrink-0 border-b border-gray-200">
            <div class="flex items-center space-x-3">
                <div class="w-8 h-8 rounded-md bg-brandblue flex items-center justify-center shadow-md">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                </div>
                <h1 class="text-3xl font-black text-gray-900 tracking-tight">The Sommelier <span class="text-lg text-gray-400 font-medium tracking-normal ml-2">| Risk Analysis</span></h1>
            </div>
            
            <div class="flex items-center space-x-3">
                <button type="button" id="toggle-filters-btn" class="bg-white border border-gray-300 hover:border-brandblue hover:bg-gray-50 text-gray-700 font-bold text-xs px-4 py-2 rounded-md transition-colors shadow-sm">
                    Show Filters
                </button>
                <button type="button" onclick="exportMatrixToCSV()" class="bg-white border border-gray-300 hover:border-brandblue hover:bg-gray-50 text-gray-700 font-bold text-xs px-4 py-2 rounded-md transition-colors shadow-sm">
                    Export CSV
                </button>
            </div>
        </div>

        <!-- FILTER BAR -->
        <div id="filter-bar" class="data-panel p-4 flex-col gap-4 shrink-0 z-40 relative hidden">
            <div class="flex flex-wrap gap-4 items-end">
                <div class="relative w-40"><label class="block text-[9px] font-bold text-gray-500 uppercase mb-1">Date</label>
                    <div class="cursor-pointer bg-white border border-gray-300 rounded px-3 py-1.5 text-xs font-medium" id="btn-filter-date" onclick="window.toggleDropdown('dropdown-date')">
                        <span id="text-filter-date" class="truncate">All Selected</span>
                    </div><div class="filter-dropdown" id="dropdown-date"></div>
                </div>
                <div class="relative w-40"><label class="block text-[9px] font-bold text-gray-500 uppercase mb-1">Campaign</label>
                    <div class="cursor-pointer bg-white border border-gray-300 rounded px-3 py-1.5 text-xs font-medium" id="btn-filter-campaign" onclick="window.toggleDropdown('dropdown-campaign')">
                        <span id="text-filter-campaign" class="truncate">All Selected</span>
                    </div><div class="filter-dropdown" id="dropdown-campaign"></div>
                </div>
                <button type="button" id="apply-filters-btn" class="bg-brandblue text-white text-xs font-bold px-6 py-1.5 rounded shadow-sm">Apply Filters</button>
            </div>
        </div>

        <!-- MANUAL DOMAIN ANI TOGGLE -->
        <div class="flex items-center space-x-2 py-1 shrink-0">
            <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Domain ANI:</label>
            <div class="flex bg-gray-100 p-1 rounded-lg border border-gray-200 shadow-inner">
                <button type="button" id="domain-all" class="px-4 py-1.5 text-[10px] font-bold rounded shadow-sm bg-white text-brandblue transition-all uppercase tracking-widest">ALL</button>
                <button type="button" id="domain-yes" class="px-4 py-1.5 text-[10px] font-semibold rounded text-gray-500 hover:text-gray-800 transition-all uppercase tracking-widest">YES</button>
                <button type="button" id="domain-no" class="px-4 py-1.5 text-[10px] font-semibold rounded text-gray-500 hover:text-gray-800 transition-all uppercase tracking-widest">NO</button>
            </div>
        </div>

        <!-- 4 KPIS -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6 shrink-0">
            <div class="bg-gradient-to-br from-[#0047BB] to-[#001b4a] rounded-xl p-5 shadow-md flex flex-col card-hover">
                <span class="text-[10px] font-bold text-blue-200 uppercase mb-1">Evaluated</span>
                <span class="text-4xl font-black text-white" id="kpi-total-anis">--</span>
            </div>
            <div class="bg-emerald-600 rounded-xl p-5 shadow-md flex flex-col card-hover">
                <span class="text-[10px] font-bold text-emerald-100 uppercase mb-1">Clean</span>
                <span class="text-4xl font-black text-white" id="kpi-clean">--</span>
            </div>
            <div class="bg-amber-500 rounded-xl p-5 shadow-md flex flex-col card-hover">
                <span class="text-[10px] font-bold text-amber-100 uppercase mb-1">Rotate</span>
                <span class="text-4xl font-black text-white" id="kpi-rotate">--</span>
            </div>
            <div class="bg-red-600 rounded-xl p-5 shadow-md flex flex-col card-hover">
                <span class="text-[10px] font-bold text-red-100 uppercase mb-1">Burned</span>
                <span class="text-4xl font-black text-white" id="kpi-burned">--</span>
            </div>
        </div>

        <!-- VISUALS: HISTOGRAM & HEALTH BAR -->
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 shrink-0 h-[220px]">
            <div class="lg:col-span-3 data-panel flex flex-col relative overflow-hidden">
                <div class="flex-1 w-full p-5 pt-4 relative flex flex-col bg-gray-50">
                    <div class="flex-1 border-l-2 border-b-2 border-gray-300 flex items-end justify-around px-2 relative" id="histogram-container"></div>
                </div>
            </div>
            <div class="lg:col-span-1 data-panel flex flex-col p-5 items-center justify-center bg-gray-50">
                <h3 class="text-[10px] font-bold text-gray-500 uppercase mb-4">Inventory Health</h3>
                <div class="w-full h-10 flex rounded-md overflow-hidden border border-gray-200 shadow-inner">
                    <div class="h-full bg-emerald-500 transition-all duration-1000" id="dist-bar-clean" style="width: 0%;"></div>
                    <div class="h-full bg-amber-400 transition-all duration-1000" id="dist-bar-rotate" style="width: 0%;"></div>
                    <div class="h-full bg-red-500 transition-all duration-1000" id="dist-bar-burned" style="width: 0%;"></div>
                </div>
            </div>
        </div>

        <!-- MASTER ACTION TABLE (Restored Column Set & SCROLL FIXED) -->
        <div class="flex-1 data-panel overflow-hidden flex flex-col relative z-10 min-h-0">
            <div class="overflow-auto flex-1 custom-scrollbar">
                <table class="w-full text-left border-collapse min-w-[1500px]">
                    <thead class="header-sticky z-20">
                        <tr class="bg-gray-800 text-white text-[9px] uppercase font-black tracking-wider">
                            <th class="p-3 col-sticky bg-gray-900 border-r border-gray-700">ANI</th>
                            <th class="p-3 text-center border-r border-gray-700">Calls</th>
                            <th class="p-3 text-center border-r border-gray-700">Dials/Day</th>
                            <th class="p-3 text-center bg-blue-900/50">Ctc %</th>
                            <th class="p-3 text-center bg-emerald-900/50 border-r border-gray-700">Conn %</th>
                            <th class="p-3 text-center border-r border-gray-700">Ans Mac %</th>
                            <th class="p-3 text-center border-r border-gray-700">No Ans %</th>
                            <th class="p-3 text-center border-r border-gray-700 text-red-300">Bad Num %</th>
                            <th class="p-3 text-center bg-gray-900">Score</th>
                            <th class="p-3 text-center bg-gray-900">Recommendation</th>
                        </tr>
                    </thead>
                    <tbody class="text-xs font-medium" id="action-table-body">
                        <!-- JS WILL INJECT ROWS HERE -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        let currentDomainFilter = 'all';
        const formatPct = (val) => isNaN(val) || !isFinite(val) ? "0.0%" : val.toFixed(1) + "%";

        const updateDomainUI = (mode) => {
            const active = "px-4 py-1.5 text-[10px] font-bold rounded shadow-sm bg-white text-brandblue uppercase";
            const inactive = "px-4 py-1.5 text-[10px] font-semibold rounded text-gray-500 hover:text-gray-800 uppercase";
            document.getElementById('domain-all').className = mode === 'all' ? active : inactive;
            document.getElementById('domain-yes').className = mode === 'Yes' ? active : inactive;
            document.getElementById('domain-no').className = mode === 'No' ? active : inactive;
        };

        window.toggleDropdown = function(id) {
            const el = document.getElementById(id);
            const isShowing = el.classList.contains('show');
            document.querySelectorAll('.filter-dropdown').forEach(d => d.classList.remove('show'));
            if (!isShowing) el.classList.add('show');
        };

        const loadDashboardData = (sourceDataStr) => {
            let data = null;
            if (sourceDataStr) data = JSON.parse(sourceDataStr);
            else if (window.parent && window.parent.diallyMemory) data = window.parent.diallyMemory.masterData;
            
            if (!data) return;
            const tbody = document.getElementById('action-table-body');
            tbody.innerHTML = ''; 
            let kTotal=0, kClean=0, kRotate=0, kBurned=0;
            let buckets = new Array(10).fill(0);

            Object.entries(data.anis || {}).sort((a,b)=>b[1].calls - a[1].calls).forEach(([aniStr, aData]) => {
                if (aData.calls === 0) return;
                kTotal++;
                const action = aData.action || "Monitor";
                const score = aData.riskScore || 0;
                if(action==="Keep Active") kClean++; else if(action==="Rotate") kRotate++; else if(action==="Quarantine") kBurned++;
                buckets[Math.min(Math.floor(score/10), 9)]++;

                const statusColor = action==="Keep Active" ? 'bg-emerald-50 text-emerald-700' : (action==="Rotate" ? 'bg-amber-50 text-amber-700' : 'bg-red-50 text-red-700');

                tbody.innerHTML += `<tr class="table-row-zebra border-b">
                    <td class="p-3 font-semibold font-mono col-sticky">${aniStr}</td>
                    <td class="p-3 text-center border-l">${aData.calls.toLocaleString()}</td>
                    <td class="p-3 text-center text-gray-400">${(aData.dialsPerDay || 0).toFixed(1)}</td>
                    <td class="p-3 text-center bg-blue-50/20">${formatPct((aData.contacted/aData.calls)*100)}</td>
                    <td class="p-3 text-center bg-emerald-50/20">${formatPct((aData.connects/aData.calls)*100)}</td>
                    <td class="p-3 text-center">${formatPct((aData.ansMac/aData.calls)*100)}</td>
                    <td class="p-3 text-center text-gray-400">${formatPct((aData.noAnswers/aData.calls)*100)}</td>
                    <td class="p-3 text-center text-red-600 font-bold">${formatPct((aData.badNum/aData.calls)*100)}</td>
                    <td class="p-3 text-center font-black text-brandblue bg-brandblue-light/20">${score}</td>
                    <td class="p-3 text-center"><span class="px-3 py-1 rounded text-[9px] font-extrabold uppercase border ${statusColor}">${action}</span></td>
                </tr>`;
            });

            document.getElementById('kpi-total-anis').innerText = kTotal.toLocaleString();
            document.getElementById('kpi-clean').innerText = kClean.toLocaleString();
            document.getElementById('kpi-rotate').innerText = kRotate.toLocaleString();
            document.getElementById('kpi-burned').innerText = kBurned.toLocaleString();

            const totalEv = kClean + kRotate + kBurned || 1;
            document.getElementById('dist-bar-clean').style.width = `${(kClean/totalEv)*100}%`;
            document.getElementById('dist-bar-rotate').style.width = `${(kRotate/totalEv)*100}%`;
            document.getElementById('dist-bar-burned').style.width = `${(kBurned/totalEv)*100}%`;

            const hist = document.getElementById('histogram-container'); hist.innerHTML = '';
            const maxB = Math.max(...buckets, 1);
            buckets.forEach((count, i) => {
                const h = (count / maxB) * 100;
                const color = i < 4 ? 'bg-emerald-500' : (i < 7 ? 'bg-amber-400' : 'bg-red-500');
                hist.innerHTML += `<div class="flex-1 mx-[1px] ${color} rounded-t-sm" style="height: ${h}%"></div>`;
            });
        };

        const executeFilters = () => {
            const memory = window.parent?.diallyMemory;
            if (!memory || !memory.rawCsvFile) {
                alert("No call log data found. Please upload files in Settings.");
                return;
            }
            document.getElementById('loading-overlay').classList.remove('hidden');
            const worker = new Worker('worker.js');
            worker.onmessage = (e) => {
                if (e.data.status === 'complete') {
                    document.getElementById('loading-overlay').classList.add('hidden');
                    loadDashboardData(JSON.stringify(e.data.results));
                    worker.terminate();
                }
            };
            worker.postMessage({ 
                action: 'PROCESS_CSV', file: memory.rawCsvFile, 
                mappingConfig: JSON.parse(localStorage.getItem('diallyUserPrefs')) || {},
                domainAnis: memory.inventoryAnis || [],
                filters: { domainAnis: currentDomainFilter === 'all' ? [] : [currentDomainFilter] } 
            });
        };

        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('toggle-filters-btn').addEventListener('click', () => {
                const bar = document.getElementById('filter-bar');
                bar.classList.toggle('hidden'); bar.classList.toggle('flex');
            });
            document.getElementById('domain-all').addEventListener('click', (e) => { e.preventDefault(); currentDomainFilter='all'; updateDomainUI('all'); executeFilters(); });
            document.getElementById('domain-yes').addEventListener('click', (e) => { e.preventDefault(); currentDomainFilter='Yes'; updateDomainUI('Yes'); executeFilters(); });
            document.getElementById('domain-no').addEventListener('click', (e) => { e.preventDefault(); currentDomainFilter='No'; updateDomainUI('No'); executeFilters(); });
            loadDashboardData();
        });
    </script>
</body>
</html>
