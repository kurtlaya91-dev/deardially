<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dear Dially Pro - ANI Health Matrix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { brandblue: { DEFAULT: '#0047BB' } } } } }
    </script>
    <style>
        body { background-color: transparent; color: #111827; -webkit-font-smoothing: antialiased; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .sticky-left { position: sticky; left: 0; background: white; z-index: 10; border-right: 2px solid #e5e7eb; }
        body.in-shell #sidebar { display: none; }
        body.in-shell main { margin-left: 0 !important; }
        .cell-data { border-right: 1px solid #f3f4f6; }
    </style>
</head>
<body class="min-h-screen flex p-4 overflow-hidden relative">

    <!-- RESTORED SIDEBAR -->
    <nav id="sidebar" class="fixed left-4 top-4 bottom-4 z-50 w-[72px] bg-white shadow-lg rounded-lg">
       <div class="p-6"><div class="w-10 h-10 bg-brandblue rounded-md"></div></div>
    </nav>

    <main class="flex-1 ml-[88px] p-4 lg:p-8 overflow-hidden flex flex-col h-screen">
        <div class="flex justify-between items-center border-b pb-4 mb-6">
            <h1 class="text-3xl font-black text-gray-900 tracking-tight">ANI Delivery Matrix</h1>
            <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Wired to Shell Memory</span>
        </div>
        
        <div class="flex-1 bg-white border border-gray-200 rounded-xl overflow-auto shadow-sm">
            <table class="w-full text-left border-collapse" id="matrix-table">
                <thead id="matrix-header" class="sticky top-0 z-20 bg-gray-800 text-white text-[9px] uppercase font-black"></thead>
                <tbody id="matrix-body" class="text-xs font-semibold"></tbody>
            </table>
        </div>
    </main>

    <script>
        const renderMatrix = (data) => {
            const header = document.getElementById('matrix-header'); const body = document.getElementById('matrix-body');
            header.innerHTML = ''; body.innerHTML = '';
            const dates = Object.keys(data.dailyMetrics || {}).sort();
            
            let headHtml = `<tr><th class="p-4 sticky-left bg-gray-900 min-w-[140px]">ANI</th>`;
            dates.forEach(d => headHtml += `<th class="p-4 text-center border-r border-gray-700 min-w-[100px]">${d.substring(5)}</th>`);
            header.innerHTML = headHtml + `<th class="p-4 text-center bg-gray-900 min-w-[100px]">Total Avg</th></tr>`;

            Object.entries(data.anis || {}).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([ani, aData]) => {
                let rowHtml = `<tr class="border-b border-gray-100 hover:bg-brandblue/5"><td class="p-4 font-mono font-bold sticky-left">${ani}</td>`;
                let totalCalls = 0; let totalCtc = 0;

                dates.forEach(d => {
                    const day = aData.daily[d];
                    if(!day || day.calls === 0) { rowHtml += `<td class="p-4 text-center text-gray-300 border-r border-gray-50">-</td>`; }
                    else {
                        totalCalls += day.calls; totalCtc += day.contacted;
                        const rate = ((day.contacted / day.calls) * 100).toFixed(0);
                        const color = rate < 15 ? 'bg-red-50 text-red-700' : (rate < 25 ? 'bg-amber-50 text-amber-700' : 'bg-emerald-50 text-emerald-700');
                        rowHtml += `<td class="p-4 text-center ${color} cell-data">
                            <div class="text-[8px] opacity-60">${day.calls} calls</div>
                            <div class="text-xs font-black">${rate}%</div>
                        </td>`;
                    }
                });
                
                const avgRate = totalCalls > 0 ? ((totalCtc/totalCalls)*100).toFixed(1) : 0;
                rowHtml += `<td class="p-4 text-center bg-gray-50 font-black text-brandblue">${avgRate}%</td></tr>`;
                body.innerHTML += rowHtml;
            });
        };

        window.addEventListener('DOMContentLoaded', () => {
            if (window.self !== window.top) document.body.classList.add('in-shell');
            if (window.parent.diallyMemory?.masterData) renderMatrix(window.parent.diallyMemory.masterData);
        });
    </script>
</body>
</html>
